<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trèves 2026 - Carte interactive</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
    }
    header {
      padding: 16px 20px;
      background: darkred;
      color: white;
    }
    header h1 {
      margin: 0;
      font-size: 1.6rem;
    }
    header p {
      margin: 6px 0 0;
    }
    #map {
      height: calc(100vh - 90px);
      width: 100%;
    }
    .leaflet-popup-content a {
      color: darkblue;
      text-decoration: none;
    }
    .leaflet-popup-content a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Trèves 2026 - Carte interactive</h1>
    <p>Clique sur un repère pour voir le site correspondant.</p>
  </header>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([49.7497, 6.6371], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const lieux = [
      { nom: 'Vue sur le palais', coords: [49.7499, 6.6398], lien: 'palais.html' },
      { nom: "Vue du temple d'Esculape", coords: [49.7469, 6.6247], lien: 'temple_esculape.html' },
      { nom: "Vue du temple d'Herrenbrunn", coords: [49.7488, 6.6208], lien: 'temple_herrenbrunn.html' },
      { nom: 'Forum : Vue Nord Ouest', coords: [49.7482, 6.6341], lien: 'forum_nord_ouest.html' },
      { nom: 'Porta Nigra côté nord', coords: [49.7590, 6.6442], lien: 'porta_nigra_nord.html' },
      { nom: 'Amphithéâtre entrée sud', coords: [49.7448, 6.6463], lien: 'amphitheatre_sud.html' },
      { nom: 'Amphithéâtre intérieur', coords: [49.7451, 6.6460], lien: 'amphitheatre_interieur.html' },
      { nom: 'Intérieur basilique', coords: [49.7507, 6.6385], lien: 'basilique_interieur.html' },
      { nom: 'Thermes de Barbara vue sud', coords: [49.7443, 6.6314], lien: 'thermes_barbara.html' },
      { nom: 'Porta Nigra vue sud', coords: [49.7585, 6.6442], lien: 'porta_nigra_sud.html' },
      { nom: 'Basilique entrée et palais', coords: [49.7503, 6.6391], lien: 'basilique_palais.html' },
      { nom: 'Cathédrale valentinienne', coords: [49.7560, 6.6415], lien: 'cathedrale_valentinienne.html' },
      { nom: 'Porta Media et ses remparts', coords: [49.7525, 6.6335], lien: 'porta_media_remparts.html' },
      { nom: 'Cimetière nord', coords: [49.7632, 6.6398], lien: 'cimetiere_nord.html' },
      { nom: 'Vue du palais du procurateur', coords: [49.7490, 6.6389], lien: 'palais_procurateur.html' },
      { nom: 'Pont de la Moselle', coords: [49.7548, 6.6255], lien: 'pont_moselle.html' },
      { nom: 'Les horrea vue nord est', coords: [49.7471, 6.6346], lien: 'horrea.html' },
      { nom: 'Cirque', coords: [49.7424, 6.6418], lien: 'cirque.html' },
      { nom: 'Amphithéâtre entrée nord', coords: [49.7455, 6.6464], lien: 'amphitheatre_nord.html' }
    ];

    const bounds = [];

    lieux.forEach(lieu => {
      const marker = L.marker(lieu.coords).addTo(map);
      marker.bindPopup(`
        <strong>${lieu.nom}</strong><br>
        <a href="${lieu.lien}" target="_blank">Ouvrir la page</a>
      `);
      bounds.push(lieu.coords);
    });

    if (bounds.length) {
      map.fitBounds(bounds, { padding: [30, 30] });
    }
  </script>
</body>
</html>
